#cloud-config

write_files:
- path: /tmp/environment.env
  permissions: '0600'
  owner: root
  encoding: b64
  content: "{{ ENVIRONMENT_FILE }}"

- path: /tmp/fetch-secrets.sh
  permissions: '0755'
  owner: root
  content: |
    #!/bin/bash
    # Fetch GCP secrets from Secret Manager using metadata server
    # and write them to an environment file

    set -euo pipefail

    OUTPUT_FILE="${1:-/tmp/secrets.env}"
    # Always create a fresh env file so the service can start even when no secrets are configured.
    : > "${OUTPUT_FILE}"

    # Get access token from metadata server
    get_access_token() {
        curl -s -H "Metadata-Flavor: Google" \
            "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
            | jq -r ".access_token"
    }

    # Fetch a secret from Secret Manager
    fetch_secret() {
        local secret_name="$1"
        local access_token="$2"

        curl -s -H "Authorization: Bearer ${access_token}" \
            "https://secretmanager.googleapis.com/v1/${secret_name}/versions/latest:access" \
            | jq -r ".payload.data" \
            | base64 -d
    }

    {% if SECRETS %}
    ACCESS_TOKEN=$(get_access_token)
    {% for secret_var, secret_name in SECRETS.items() %}
    SECRET_VALUE=$(fetch_secret "{{ secret_name }}" "${ACCESS_TOKEN}")
    if [[ "${SECRET_VALUE}" == *$'\r'* || "${SECRET_VALUE}" == *$'\n'* ]]; then
        echo "Secret value for {{ secret_var }} contains an unsupported newline" >&2
        exit 1
    fi
    printf '%s=%s\n' "{{ secret_var }}" "${SECRET_VALUE}" >> "${OUTPUT_FILE}"
    {% endfor %}
    {% endif %}

    chmod 600 "${OUTPUT_FILE}"

- path: /etc/cloudservice-health
  permissions: '0755'
  owner: root
  content: |
    #!/bin/bash
    set -euo pipefail

    while IFS= read -r line; do
        [[ "${line}" == $'\r' || -z "${line}" ]] && break
    done

    if [ "$(docker inspect --format '{% raw %}{{.State.Running}}{% endraw %}' cloudservice.service 2>/dev/null || true)" = "true" ]; then
        printf 'HTTP/1.1 200 OK\r\nContent-Length: 0\r\nConnection: close\r\n\r\n'
    else
        printf 'HTTP/1.1 503 Service Unavailable\r\nContent-Length: 0\r\nConnection: close\r\n\r\n'
    fi

- path: /etc/systemd/system/cloudservice.service
  permissions: '0644'
  owner: root
  content: |
    [Unit]
    Description=Tilebox Workflow Runner
    {% if GCP_REGISTRY_HOSTNAME %}
    Wants=gcr-online.target
    After=gcr-online.target
    {% else %}
    Wants=network-online.target
    After=network-online.target
    {% endif %}

    [Service]
    Type=simple
    Restart=always
    RestartSec=5
    Environment="HOME=/home/cloudservice"
    {% if GCP_REGISTRY_HOSTNAME %}
    ExecStartPre=/usr/bin/docker-credential-gcr configure-docker --registries {{ GCP_REGISTRY_HOSTNAME }}
    {% endif %}
    ExecStartPre=/bin/bash /tmp/fetch-secrets.sh
    ExecStartPre=/usr/bin/docker pull {{ CONTAINER_IMAGE }}

    ExecStart=/usr/bin/docker run --rm \
      --env-file /tmp/environment.env \
      --env-file /tmp/secrets.env \
      --name %n \
      {{ CONTAINER_IMAGE }}
    ExecStop=-/usr/bin/docker stop %n
    ExecStopPost=-/usr/bin/docker rm %n

- path: /etc/systemd/system/cloudservice-health.socket
  permissions: '0644'
  owner: root
  content: |
    [Unit]
    Description=Tilebox Workflow Runner Health Socket

    [Socket]
    ListenStream=8080
    Accept=yes

    [Install]
    WantedBy=sockets.target

- path: /etc/systemd/system/cloudservice-health@.service
  permissions: '0644'
  owner: root
  content: |
    [Unit]
    Description=Serve Tilebox Workflow Runner Health
    After=docker.service
    Requires=docker.service

    [Service]
    Type=oneshot
    TimeoutStartSec=5s
    ExecStart=/etc/cloudservice-health
    StandardInput=socket
    StandardOutput=socket

runcmd:
- /sbin/iptables -A INPUT -s 130.211.0.0/22 -p tcp --dport 8080 -j ACCEPT
- /sbin/iptables -A INPUT -s 35.191.0.0/16 -p tcp --dport 8080 -j ACCEPT
- systemctl daemon-reload
- systemctl start cloudservice.service
- systemctl start cloudservice-health.socket
