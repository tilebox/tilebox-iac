#cloud-config

packages:
  - docker
  - awscli

write_files:
- path: /tmp/fetch-secrets.sh
  permissions: '0755'
  owner: root
  content: |
    #!/bin/bash
    # Fetch AWS secrets from Secrets Manager using IMDS credentials
    set -euo pipefail
    OUTPUT_FILE="${1:-/tmp/secrets.env}"
    REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
    {% for secret_var, secret_arn in SECRETS.items() %}
    echo {{ secret_var }}=$(aws secretsmanager get-secret-value --region "${REGION}" --secret-id "{{ secret_arn }}" --query SecretString --output text) >> "${OUTPUT_FILE}"
    {% endfor %}
    chmod 600 "${OUTPUT_FILE}"

- path: /etc/systemd/system/cloudservice.service
  permissions: '0644'
  owner: root
  content: |
    [Unit]
    Description=Cloud Service Container
    After=docker.service
    Requires=docker.service

    [Service]
    Type=simple
    Restart=always
    RestartSec=5
    ExecStartPre=/tmp/fetch-secrets.sh /tmp/secrets.env
    ExecStartPre=/bin/bash -c 'REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region) && aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin {{ REGISTRY_HOSTNAME }}'
    ExecStartPre=/usr/bin/docker pull {{ CONTAINER_IMAGE }}
    ExecStart=/usr/bin/docker run --rm --name cloudservice --env-file /tmp/secrets.env {% for key, value in ENVIRONMENT_VARS.items() %}-e {{ key }}={{ value }} {% endfor %}{{ CONTAINER_IMAGE }}
    ExecStop=/usr/bin/docker stop cloudservice

    [Install]
    WantedBy=multi-user.target

runcmd:
  - systemctl daemon-reload
  - systemctl enable docker.service
  - systemctl start docker.service
  - systemctl enable cloudservice.service
  - systemctl start cloudservice.service
